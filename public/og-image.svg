<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#07101f"/>
  <!-- Grid lines subtle -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#182b45" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#182b45" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#182b45" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#182b45" stroke-width="1"/>
  <!-- Logo -->
  <rect x="490" y="180" width="56" height="56" rx="14" fill="#4f74ff"/>
  <circle cx="510" cy="200" r="10" fill="none" stroke="white" stroke-width="2.5"/>
  <circle cx="526" cy="216" r="10" fill="none" stroke="white" stroke-width="2.5"/>
  <!-- Title -->
  <text x="600" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#dce8ff" text-anchor="middle">Competitor Tracker</text>
  <!-- Subtitle -->
  <text x="600" y="335" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#4d6a8a" text-anchor="middle">Monitor your competitors automatically</text>
  <!-- Badge -->
  <rect x="468" y="370" width="264" height="40" rx="20" fill="#4f74ff" fill-opacity="0.15" stroke="#4f74ff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="600" y="396" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#7a96ff" text-anchor="middle">Automatic · Daily · Free to start</text>
</svg>
